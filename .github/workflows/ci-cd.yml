name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
    
    - name: Run Tests
      run: |
        cd backend
        mvn clean test
    
    - name: Build
      run: |
        cd backend
        mvn clean package -DskipTests

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install Dependencies
      run: |
        cd frontend
        npm ci
    
    - name: Run Tests
      run: |
        cd frontend
        npm run test
    
    - name: Build
      run: |
        cd frontend
        npm run build

  test-ai-service:
    name: Test AI Service
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: ai-service/requirements.txt
    
    - name: Install Dependencies
      run: |
        cd ai-service
        pip install -r requirements.txt
    
    - name: Run Tests
      run: |
        cd ai-service
        pytest

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-ai-service]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and Push Backend
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: medical-ai/backend:latest
        cache-from: type=registry,ref=medical-ai/backend:buildcache
        cache-to: type=registry,ref=medical-ai/backend:buildcache,mode=max
    
    - name: Build and Push Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: medical-ai/frontend:latest
        cache-from: type=registry,ref=medical-ai/frontend:buildcache
        cache-to: type=registry,ref=medical-ai/frontend:buildcache,mode=max
    
    - name: Build and Push AI Service
      uses: docker/build-push-action@v5
      with:
        context: ./ai-service
        push: true
        tags: medical-ai/ai-service:latest
        cache-from: type=registry,ref=medical-ai/ai-service:buildcache
        cache-to: type=registry,ref=medical-ai/ai-service:buildcache,mode=max

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /opt/medical-ai-platform
          docker-compose pull
          docker-compose up -d
          docker system prune -f
