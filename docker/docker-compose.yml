version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: medical-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: medical_image_analysis
      MYSQL_USER: medical_user
      MYSQL_PASSWORD: medical_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - medical-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: medical-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - medical-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Service
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: medical-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/medical_image_analysis?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: medical_user
      SPRING_DATASOURCE_PASSWORD: medical_pass
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - medical-network
    volumes:
      - ../backend/uploads:/app/uploads
      - ../backend/logs:/app/logs

  # AI Service
  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: medical-ai-service
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql://medical_user:medical_pass@mysql:3306/medical_image_analysis
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - mysql
      - redis
    networks:
      - medical-network
    volumes:
      - ../ai-service/models:/app/models
      - ../ai-service/uploads:/app/uploads

  # Frontend Service
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: medical-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
      - ai-service
    networks:
      - medical-network

volumes:
  mysql-data:
  redis-data:

networks:
  medical-network:
    driver: bridge
